name: Run switched packages content validation for javascript
trigger: none

parameters:
- name: packages
  displayName: |
      Comma-delimited list of packages to test against (by default, 'all' to run all). Example: 'azure-storage-queue, azure-search-documents'
  type: string
  default: 'all'

- name: branch
  displayName: |
      You can choose the review version of the page for testing, and you need to select the corresponding branch. Example: 'nickwalk/yaml-changes'
  type: string
  default: 'main'

- name: language
  displayName: |
      You can choose the language for testing, only Python, Java, JavaScript supported now. We plan extent to .NET and Go in future. Example: JavaScript
  type: string
  default: 'JavaScript'
  values:
  - Python
  - Java
  - JavaScript
  - DotNet
  - Go

stages:
- stage: ContentValidationTesting
  jobs:
  - ${{ each packageName in split(parameters.packages, ',') }}:
    - ${{ if ne(parameters.packages, 'all') }}:
      - template: /eng/pipelines/javascript/package/${{ packageName }}.yml
        parameters:
          AzureDevOpsPat: $(AZURE_DEVOPS_PAT)
          GitHubPat: $(GITHUB_PAT)
          GitHubOwner: $(GITHUB_OWNER)
          GitHubRepo: $(GITHUB_REPO)
          Branch: ${{ parameters.branch }}

  - ${{ if eq(parameters.packages, 'all') }}:
    - template: /eng/pipelines/javascript/package/run-all-packages.yml
      parameters:
        AzureDevOpsPat: $(AZURE_DEVOPS_PAT)
        GitHubPat: $(GITHUB_PAT)
        GitHubOwner: $(GITHUB_OWNER)
        GitHubRepo: $(GITHUB_REPO)
        Branch: ${{ parameters.branch }}


- stage: TotalIssuesSummary
  condition: always()
  jobs:
  - job: Maintain_Total_Issues_List
    displayName: Maintain_Total_Issues_List
    pool:
      name: Default
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: Download The Last Artifact history-issues-summary
      inputs:
        buildType: 'specific'
        project: 'content-validation-automation'
        pipeline: 'Content Validation For JavaScript'
        buildVersionToDownload: 'latestFromBranch'
        allowPartiallySucceededBuilds: true
        allowFailedBuilds: true
        branchName: 'refs/heads/main'
        artifactName: 'issues-summary'
        downloadPath: '$(System.DefaultWorkingDirectory)/Artifacts'
      continueOnError: true

    - task: DownloadPipelineArtifact@2
      displayName: Download The Current Artifact 
      inputs:
        buildType: 'current'
        downloadPath: '$(System.DefaultWorkingDirectory)/Artifacts'

    - task: DotNetCoreCLI@2
      displayName: Build issuer helper project
      inputs:
        command: 'build'
        projects: 'IssuerHelper/IssuerHelper.csproj'

    - task: PowerShell@2
      displayName: Get the current pipeline url
      inputs:
        targetType: 'inline'
        script: |
          # Get predefined variables with proper escaping for self-hosted agents
          $organization = "$(System.CollectionUri)"
          $project = "$(System.TeamProject)"
          $buildId = "$(Build.BuildId)"
          
          # Ensure organization URL ends with /
          if (-not $organization.EndsWith('/')) {
            $organization += '/'
          }
          
          # Construct the pipeline URL
          $pipelineUrl = "${organization}${project}/_build/results?buildId=${buildId}"
          
          Write-Host "Organization: $organization"
          Write-Host "Project: $project"
          Write-Host "Build ID: $buildId"
          Write-Host "Pipeline URL: $pipelineUrl"
          
          # Set the pipeline variable
          Write-Host "##vso[task.setvariable variable=pipelineUrl;]$pipelineUrl"

    - task: PowerShell@2
      displayName: Validate Environment Variables
      inputs:
        targetType: 'inline'
        script: |
          # Validate that all required variables are available
          $workingDir = "$(System.DefaultWorkingDirectory)"
          $organization = "$(System.CollectionUri)"
          $project = "$(System.TeamProject)"
          $buildId = "$(Build.BuildId)"
          
          Write-Host "=== Environment Validation ==="
          Write-Host "Working Directory: $workingDir"
          Write-Host "Organization: $organization"
          Write-Host "Project: $project"
          Write-Host "Build ID: $buildId"
          
          # Check if essential directories exist
          if (Test-Path "$workingDir/IssuerHelper") {
            Write-Host "✓ IssuerHelper directory found"
          } else {
            Write-Warning "⚠ IssuerHelper directory not found at $workingDir/IssuerHelper"
          }
          
          if (Test-Path "$workingDir/Artifacts") {
            Write-Host "✓ Artifacts directory found"
          } else {
            Write-Warning "⚠ Artifacts directory not found at $workingDir/Artifacts"
          }
          
          # Validate that required variables are not empty
          if ([string]::IsNullOrEmpty($organization) -or [string]::IsNullOrEmpty($project) -or [string]::IsNullOrEmpty($buildId)) {
            Write-Error "❌ One or more required Azure DevOps variables are missing!"
            Write-Error "This might indicate an issue with the self-hosted agent configuration."
            exit 1
          } else {
            Write-Host "✓ All required variables are available"
          }

    - task: DotNetCoreCLI@2
      displayName: Summary Total Issues of all packages
      env:
        PackageName: ${{ parameters.packages }}
        PipelineRunLink: $(pipelineUrl)
        GitHubPat: $(GITHUB_PAT)
        Language: ${{ parameters.language }}
        GitHubOwner: $(GITHUB_OWNER)
        GitHubRepo: $(GITHUB_REPO)
      inputs:
        command: 'run'
        workingDirectory: '$(System.DefaultWorkingDirectory)/IssuerHelper'

    - task: PublishPipelineArtifact@1
      displayName: "Upload pipeline test data"
      inputs:
        targetPath: $(System.DefaultWorkingDirectory)/Reports
        artifactName: issues-summary
        publishLocation: "pipeline"

    - task: PowerShell@2
      displayName: 'Push commit about current pipeline status'
      inputs:
        targetType: 'inline'
        script: |
          $workingDir = "$(System.DefaultWorkingDirectory)"
          $agentOS = "$(Agent.OS)"
          
          Write-Host "Agent OS: $agentOS"
          Write-Host "Working Directory: $workingDir"
          
          if ($agentOS -eq "Windows_NT") {
            # Use PowerShell script for Windows
            $scriptPath = "$workingDir/eng/scripts/push-pipeline-result-markdown.ps1"
            
            Write-Host "Using PowerShell script: $scriptPath"
            
            if (Test-Path $scriptPath) {
              & $scriptPath -GitHubPat "$(GITHUB_PAT)" -RepoOwner "$(GITHUB_OWNER)" -RepoName "$(GITHUB_REPO)" -GitUserName "$(GIT_USER_NAME)" -GitUserEmail "$(GIT_USER_EMAIL)" -Language "${{ parameters.language }}"
            } else {
              Write-Error "PowerShell script not found at: $scriptPath"
              exit 1
            }
          } else {
            # Use bash script for Linux/macOS
            $bashScript = "$workingDir/eng/scripts/push-pipeline-result-markdown.sh"
            
            Write-Host "Using Bash script: $bashScript"
            
            if (Test-Path $bashScript) {
              # Make script executable
              bash -c "chmod +x '$bashScript'"
              
              # Execute script
              bash -c "'$bashScript' '$(GITHUB_PAT)' '$(GITHUB_OWNER)' '$(GITHUB_REPO)' '$(GIT_USER_NAME)' '$(GIT_USER_EMAIL)' '${{ parameters.language }}'"
            } else {
              Write-Error "Bash script not found at: $bashScript"
              exit 1
            }
          }